name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://localhost/test
          USDA_API_KEY: test
          API_KEY: test-key
        run: pytest -q tests/test_app.py tests/test_models.py tests/test_usda.py

  migrations-and-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: diet_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d diet_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/diet_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/diet_test
      USDA_API_KEY: test
      API_KEY: test-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Migration smoke test
        run: alembic upgrade head

      - name: Run integration tests
        run: pytest -q -m integration tests/integration/test_repositories.py
