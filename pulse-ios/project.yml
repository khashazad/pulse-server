name: Nutrition
options:
  bundleIdPrefix: com.khxsh
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Nutrition:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Nutrition
        excludes:
          - "Info.plist"
    resources: []
    info:
      path: Nutrition/Info.plist
      properties:
        CFBundleDisplayName: Nutrition
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khxsh.nutrition
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only

  NutritionTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NutritionTests
    dependencies:
      - target: Nutrition
    info:
      path: NutritionTests/Info.plist
      properties:
        CFBundleIdentifier: com.khxsh.nutrition.tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khxsh.nutrition.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nutrition.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Nutrition"
