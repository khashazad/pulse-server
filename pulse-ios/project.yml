name: Pulse
options:
  bundleIdPrefix: com.khxsh
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Pulse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Pulse
        excludes:
          - "Info.plist"
    resources: []
    info:
      path: Pulse/Info.plist
      properties:
        CFBundleDisplayName: Pulse
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: To take progress photos and meal-prep container photos.
        NSPhotoLibraryUsageDescription: To pick progress and meal-prep container photos from your library.
        BaseURL: $(PULSE_BASE_URL)
    preBuildScripts:
      - name: Verify BaseURL
        script: |
          if [ -z "${PULSE_BASE_URL}" ]; then
            echo "error: PULSE_BASE_URL not set in environment at build time. Export it before xcodebuild."
            exit 1
          fi
          case "${PULSE_BASE_URL}" in
            http://*|https://*) ;;
            *)
              echo "error: PULSE_BASE_URL must be an absolute http(s) URL, got: ${PULSE_BASE_URL}"
              exit 1
              ;;
          esac
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khxsh.diettracker
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        # xcodegen interpolates ${PULSE_BASE_URL} from the shell at
        # generation time, baking a literal build setting into the pbxproj.
        # Info.plist's $(PULSE_BASE_URL) substitution then resolves to it.
        PULSE_BASE_URL: ${PULSE_BASE_URL}

  PulseTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PulseTests
    dependencies:
      - target: Pulse
    info:
      path: PulseTests/Info.plist
      properties:
        CFBundleIdentifier: com.khxsh.pulse.tests
        BaseURL: https://example.test
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khxsh.pulse.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Pulse.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Pulse"
