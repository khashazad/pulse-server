name: DietTracker
options:
  bundleIdPrefix: com.khxsh
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  DietTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DietTracker
        excludes:
          - "Info.plist"
    resources: []
    info:
      path: DietTracker/Info.plist
      properties:
        CFBundleDisplayName: Diet Tracker
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: To take photos of meal-prep containers.
        NSPhotoLibraryUsageDescription: To pick photos of meal-prep containers from your library.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khxsh.diettracker
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only

  DietTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DietTrackerTests
    dependencies:
      - target: DietTracker
    info:
      path: DietTrackerTests/Info.plist
      properties:
        CFBundleIdentifier: com.khxsh.diettracker.tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khxsh.diettracker.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DietTracker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DietTracker"
