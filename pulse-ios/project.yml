name: DietTracker
options:
  bundleIdPrefix: com.khxsh
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  DietTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DietTracker
        excludes:
          - "Info.plist"
    resources: []
    info:
      path: DietTracker/Info.plist
      properties:
        CFBundleDisplayName: Diet Tracker
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: To take photos of meal-prep containers.
        NSPhotoLibraryUsageDescription: To pick photos of meal-prep containers from your library.
        BaseURL: $(DIET_TRACKER_BASE_URL)
    configFiles:
      Debug: DietTracker/Config/BuildConfig.xcconfig
      Release: DietTracker/Config/BuildConfig.xcconfig
    preBuildScripts:
      - name: Verify BaseURL
        script: |
          if [ -z "${DIET_TRACKER_BASE_URL}" ]; then
            echo "error: DIET_TRACKER_BASE_URL not set in environment at build time. Export it before xcodebuild."
            exit 1
          fi
          case "${DIET_TRACKER_BASE_URL}" in
            http://*|https://*) ;;
            *)
              echo "error: DIET_TRACKER_BASE_URL must be an absolute http(s) URL, got: ${DIET_TRACKER_BASE_URL}"
              exit 1
              ;;
          esac
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khxsh.diettracker
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only

  DietTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DietTrackerTests
    dependencies:
      - target: DietTracker
    info:
      path: DietTrackerTests/Info.plist
      properties:
        CFBundleIdentifier: com.khxsh.diettracker.tests
        BaseURL: https://example.test
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khxsh.diettracker.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DietTracker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DietTracker"
